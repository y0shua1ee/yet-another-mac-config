# mpv 配置 — macOS / Apple Silicon
# 文档: https://mpv.io/manual/stable/

# === 视频输出 ===
vo=gpu-next
profile=gpu-hq
hwdec=videotoolbox          # macOS 原生硬解，省电低发热

# === 窗口 ===
autofit-larger=50%x50%      # 窗口不超过屏幕 50%，防止弹 4K 全屏
keep-open=yes               # 播完停在最后一帧，不关窗口
keepaspect-window=yes       # 缩放时保持比例

# === OSC 播控条 ===
osc=yes

# === 音量 ===
volume=80
volume-max=150              # 允许超 100%
alang=ja,en,zh              # 音轨偏好: 日→英→中

# === 字幕 ===
sub-auto=fuzzy
sub-file-paths=subs
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-tag-colorspace=yes

# === 缓存 (在线播放) ===
cache=yes
cache-secs=60               # 缓冲 60 秒
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=75MiB

# === OSD ===
osd-level=1
osd-duration=1500
osd-font-size=24

# === 杂项 ===
save-position-on-quit=yes   # 记住播放位置
ytdl=yes                    # yt-dlp 已装，直接播 URL
ytdl-format=bestvideo[height<=2160]+bestaudio/best[height<=2160]
